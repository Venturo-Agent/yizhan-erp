name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Run type check
        run: npm run type-check

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          # CI build 時使用 placeholder（實際值由 Vercel 注入）
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key

      - name: Check bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          npm run build 2>&1 | grep -A 60 "Route (app)" >> $GITHUB_STEP_SUMMARY || true

  e2e-smoke:
    name: E2E Smoke (login + create-tenant 路徑守門)
    runs-on: ubuntu-latest
    needs: build
    # ⏸ 2026-05-27 停用（William 拍板）：此 E2E 守門需 Supabase 連線 secrets + 隔離 test DB。
    #   開發階段（漫途自用、員工少、改動可人工驗、RLS 已有獨立 CI 守門兜底）暫不需要，
    #   且 repo 從沒配 secrets → 一直 fail 誤導。先停用、保留 job 定義不刪。
    #   未來 SaaS 化要啟用：設 repo variable E2E_SMOKE_ENABLED=true + 照 backlog 卡建 test DB。
    #   backlog 卡：workspace/_meta/backlog/2026-05-27-e2e-login守門待建.md
    # 啟用時需要的 GitHub Secrets：
    #   NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY / SUPABASE_SERVICE_ROLE_KEY / TEST_PASSWORD
    if: ${{ vars.E2E_SMOKE_ENABLED == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Start Next.js + run smoke specs
        run: |
          npx next start &
          # 等 server up (60s timeout)
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          # login-api: 守 4 個 workspace 都被 admin client 找到 (FORCE RLS / singleton 紅線)
          # admin-login-permissions: 守新 schema 改動不會炸登入 + 權限路徑
          npx playwright test login-api.spec.ts admin-login-permissions.spec.ts --reporter=list
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_COMPANY_CODE: TESTUX
          TEST_USERNAME: E001
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
