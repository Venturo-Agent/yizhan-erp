name: RLS Blueprint Audit

# 對照 2026-05-13-venturo-aierp-概念架構-blueprint.md 6 層（blueprint 檔名保留歷史、內容仍適用）
# 偵測 production RLS / 中央 module SSOT 是否偏離藍圖
# PR / push 自動跑、error 擋 merge

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:  # 允許手動觸發

jobs:
  audit-rls:
    name: RLS / Blueprint 6 層守門
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Codegen freshness check (3 個 SSOT 檔跟 src/modules/* 同步)
        run: ./scripts/check-codegen-fresh.sh

      - name: Run blueprint audit
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run audit:rls

      - name: Realtime publication audit (code-only, no DB needed)
        run: npm run audit:realtime

      - name: Generate markdown report (on failure)
        if: failure()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: npm run audit:rls -- --format=markdown --warn-only > audit-report.md || true

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rls-audit-report
          path: audit-report.md
